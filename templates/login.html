<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2b2b43" />
    <title>MediSync - Login</title>
    <meta name="description" content="MediSync Medicine Inventory System - Admin Login" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}" />
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/favicon.png') }}" />
  </head>
  <body>
    <div class="login-page">
      <div class="login-bg">
        <img src="{{ url_for('static', filename='images/bg2.jpg') }}" alt="Background" />
      </div>
      <div class="login-container">
        <div class="login-card">
          <div class="login-logos">
            <div class="logo-placeholder"><img src="{{ url_for('static', filename='images/logo1.png') }}" alt="Logo 1" /></div>
            <div class="logo-placeholder"><img src="{{ url_for('static', filename='images/logo2.jpg') }}" alt="Logo 2" /></div>
            <div class="logo-placeholder"><img src="{{ url_for('static', filename='images/logo3.jpg') }}" alt="Logo 3" /></div>
          </div>
          <h1 class="login-title">MediSync</h1>
          <p class="login-subtitle">Medicine Inventory Management System</p>
          <form id="loginForm" autocomplete="off">
            <div class="form-group">
              <label for="username">Username</label>
              <input type="text" id="username" class="form-control" placeholder="Enter your username" required />
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <div class="password-input-wrap">
                <input type="password" id="password" class="form-control" placeholder="Enter your password" required />
                <button type="button" class="password-toggle" id="passwordToggle" tabindex="-1" aria-label="Toggle password visibility">
                  <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                  <svg id="eyeOffIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                    <line x1="1" y1="1" x2="23" y2="23"/>
                  </svg>
                </button>
              </div>
            </div>
            <div id="loginError" style="color:var(--coral);font-size:0.85rem;font-weight:600;margin-bottom:12px;display:none;"></div>
            <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn" style="margin-bottom: 20px;">
              Sign In
            </button>
          </form>
          <div style="border-top: 1px solid var(--border); padding-top: 16px; font-size: 0.8rem; color: var(--text-muted); text-align: center;">
            <p>By signing in, you agree to our <strong>Data Privacy Policy</strong> and system terms of use.</p>
          </div>
        </div>
        <div style="text-align:center;margin-top:24px;color:rgba(255,255,255,0.7);font-size:0.85rem;">
          &copy; 2026 MediSync. Optimized for local health center management.
        </div>
      </div>
    </div>
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
      <script>
      if (window.location.search.includes('reason=timeout')) {
        var errEl = document.getElementById('loginError');
        if (errEl) {
          errEl.textContent = 'You were logged out due to inactivity. Please sign in again.';
          errEl.style.display = 'block';
        }
      }
    </script>
    <!-- Vercel Web Analytics -->
    <script type="module" src="{{ url_for('static', filename='js/web-analytics.js') }}"></script>
  </body>
</html>
